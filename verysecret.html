<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUM</title>
    <link rel="stylesheet" href="supersupersecret.css">
</head>
<body>
  <div class="stage">
    <div class="moving-picture">
      <img src="images__33_-removebg-preview.png" alt="Moving Image">
    </div>
    <button id="startBtn">Start animation</button>
  </div>

  <audio id="doorSound" preload="auto" src="Secret Pathway Door Open (Stone Wall) - Sound Effect for editing.mp3"></audio>
  <audio id="tetoSound" preload="auto" src="Teto sound effect.mp3"></audio>

  <script>
    document.getElementById('startBtn').addEventListener('click', async function () {
      const btn = this;
      const picture = document.querySelector('.moving-picture');
      const image = picture.querySelector('img');
      const doorSound = document.getElementById('doorSound');
      const tetoSound = document.getElementById('tetoSound');

      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = 'Playing...';

      const handleSlideEnd = (event) => {
        if (event.animationName !== 'slideLeft') return;
        picture.removeEventListener('animationend', handleSlideEnd);

        image.src = 'images__35_-removebg-preview.png';
        image.alt = 'Zoom Image';
        picture.classList.remove('animate');
        picture.style.left = '50%';
        picture.style.top = '50%';
        picture.style.transform = 'translate(-50%, -50%) scale(1)';
        picture.classList.add('zooming');

        picture.addEventListener('animationend', (zoomEvent) => {
          if (zoomEvent.animationName !== 'zoomIn') return;
          window.location.href = 'Main.html';
        });
      };

      picture.addEventListener('animationend', handleSlideEnd);
      picture.classList.add('animate');

      try {
        await doorSound.play();
      } catch (error) {
        console.warn('Door sound playback blocked:', error);
      }

      setTimeout(async () => {
        try {
          await tetoSound.play();
        } catch (error) {
          console.warn('Teto sound playback blocked:', error);
        }
      }, 7000);
    });
  </script>
</body>
</html>
