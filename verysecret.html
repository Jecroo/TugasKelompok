<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUM</title>
    <link rel="stylesheet" href="supersupersecret.css">
</head>
<body>
  <div class="stage">
    <div class="moving-picture">
      <img src="images__33_-removebg-preview.png" alt="Moving Image">
    </div>
    <button id="startBtn">Start animation</button>
  </div>

  <audio id="doorSound" preload="auto" src="Secret Pathway Door Open (Stone Wall) - Sound Effect for editing.mp3"></audio>
  <audio id="ohBrotherSound" preload="auto" src="Oh Brother, this guy stinks!.mp3"></audio>

  <script>
    document.getElementById('startBtn').addEventListener('click', async function () {
      const btn = this;
      const picture = document.querySelector('.moving-picture');
      const doorSound = document.getElementById('doorSound');
      const ohBrotherSound = document.getElementById('ohBrotherSound');

      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = 'Playing...';

      picture.classList.add('animate');

      try {
        await doorSound.play();
      } catch (error) {
        console.warn('Door sound playback blocked:', error);
      }

      setTimeout(async () => {
        try {
          await ohBrotherSound.play();
        } catch (error) {
          console.warn('Oh Brother sound playback blocked:', error);
        }
      }, 7000);

      ohBrotherSound.addEventListener('ended', () => {
        window.location.href = 'Main.html';
      });

      setTimeout(() => {
        window.location.href = 'Main.html';
      }, 14000);
    });
  </script>
</body>
</html>
